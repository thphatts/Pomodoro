<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Mèo Pomodoro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="khung-game">
        <img src="asset/anhnenthat.png" alt="Nền phòng" class="anh-nen">
        <!-- Thêm điện thoại trên bàn -->
        <img src="asset/phong_hoc/Dien_thoai_chua_nhac.png" alt="Điện thoại" id="dien-thoai-ban"
            class="dien-thoai-chua-nhac">
        <img src="asset/phong_hoc/Dien_thoai_da_nhac.png" alt="Điện thoại nhấc máy" id="dien-thoai-nhac"
            class="dien-thoai-da-nhac nut-an">

        <img src="asset/backgroundmeoan.gif" alt="Nền mèo ăn" class="bg-meo-an" id="bg-meo-an">


        <div id="man-hinh-bat-dau" class="man-hinh-hien">
            <div id="cum-waboume-chinh-giua">
                <img src="asset/nutwaboume.png" alt="WABOUME" class="logo-waboume-lon">
                <img src="asset/nutready.png" alt="READY" class="nut-ready" id="nut-ready">
            </div>
        </div>

        <div id="man-hinh-game-chinh" class="man-hinh-an">
            <img src="asset/nutstart.png" alt="START" class="nut-start nut-an" id="nut-bat-dau">
        </div>

        <img src="asset/nutstop.png" alt="STOP" class="nut-stop nut-an" id="nut-stop">
        <img src="asset/nutpause.png" alt="PAUSE" class="nut-pause nut-an" id="nut-pause">
        <img src="asset/nutshop.png" alt="Cửa hàng" class="nut-cua-hang nut-an" id="mo-shop">
        <img src="asset/nutcaidat.png" alt="Cài đặt" class="nut-cai-dat nut-an" id="nut-cai-dat">

        <div class="thanh-wrap thanh-thuc-an-wrap">
            <img src="asset/thanhthucan.png" alt="Thanh Thức ăn" class="thanh-frame">
            <div class="thanh-loi" id="bar-thuc-an">
                <img src="asset/Mức thức ăn.png" alt="Mức" class="thanh-muc">
            </div>
        </div>

        <div class="thanh-wrap thanh-cam-xuc-wrap">
            <img src="asset/thanhcamxuc.png" alt="Thanh cảm xúc" class="thanh-frame">
            <div class="thanh-loi" id="bar-cam-xuc">
                <img src="asset/Mức cảm xúc.png" alt="Mức" class="thanh-muc">
            </div>
        </div>
        <img src="asset/nutvitien.png" alt="Ví tiền" class="vi-tien nut-an" id="mo-vi">

        <div class="cum-meo-game" id="cum-meo">
            <img src="asset/meongu.gif" alt="Chú mèo" class="chu-meo" id="meo-chinh">
            <img src="asset/meoan.gif" alt="Mèo ăn" class="chu-meo-an" id="meo-an">
            <img src="asset/meoxaman.gif" alt="Mèo xám ăn" class="meo-xam-an" id="meo-xam-an">

            <div id="cum-dem-gio" class="bang-an">
                <img src="asset/bangdemgio.png" alt="Bảng" class="anh-nen-bang">
                <span id="so-giay">00:00</span>
            </div>
            <!-- Bảng DONE ẩn -->
            <div id="bang-done" class="nut-an">
                <span class="chu-done">DONE!</span>
            </div>
        </div>

        <div id="man-hinh-shop" class="shop-an">
            <div class="khung-noi-dung-shop">
                <img src="asset/back.png" alt="Quay lại" id="dong-shop" class="nut-quay-lai">
                <img src="asset/nen-shop.png" alt="Nền Shop" class="anh-nen-shop">
                <img src="asset/bangtenshop.png" alt="Bảng tên shop" class="bang-ten-shop">
                <div class="danh-sach-do-an"></div>
            </div>
        </div>

        <div id="bang-tien" class="nut-an">
            <img src="asset/bangtien.png" alt="Bảng tiền" class="anh-bang-tien">
            <span id="so-tien">0</span>
        </div>
        <!-- Popup chỉnh thời gian -->
        <div id="time-popup-overlay" class="overlay" style="display: none;">
            <div class="pixel-popup">
                <img src="asset/bangchinhthoigian.png" alt="Bảng chỉnh thời gian" class="popup-bg">
                <div class="close-icon" id="close-popup" aria-label="Đóng bảng"><img src="asset/dauX.svg" alt="X"
                        width="100%"></div>

                <div class="time-display-box">
                    <span id="current-time-val">25:00</span>
                </div>

                <div class="control-row">
                    <button class="arrow-btn giam-btn" id="giam-time" aria-label="Giảm thời gian">
                        <img src="asset/nutgiamthoigian.png" alt="Giảm">
                    </button>
                    <button class="arrow-btn tang-btn" id="tang-time" aria-label="Tăng thời gian">
                        <img src="asset/nuttangthoigian.PNG" alt="Tăng">
                    </button>
                </div>

                <button class="ok-btn" id="ok-confirm" aria-label="Xác nhận">
                    <img src="asset/nutok.png" alt="OK">
                </button>
            </div>
        </div>

        <div id="signup-overlay" style="display: none;">
            <div class="pixel-popup-signup">
                <img src="asset/bangdangky.png" alt="Bảng đăng ký" class="signup-bg">

                <button class="close-signup-btn" id="close-signup" aria-label="Đóng"></button>

                <input type="text" id="username-input" class="signup-input username-pos" autocomplete="off"
                    placeholder="Username">
                <input type="password" id="password-input" class="signup-input password-pos" placeholder="Password">

                <button class="btn-signup-pixel" id="btn-signup">sign up</button>

                <div class="signup-footer-pixel">
                    Already have a account? <a href="#" id="link-login">Log in</a>
                </div>
            </div>
        </div>

        <div id="login-overlay" style="display: none;">
            <div class="pixel-popup-login">
                <img src="asset/bangdangnhap.PNG" alt="Bảng đăng nhập" class="login-bg">

                <button class="close-login-btn" id="close-login" aria-label="Đóng"></button>

                <input type="text" id="login-username-input" class="login-input login-username-pos" autocomplete="off"
                    placeholder="Username">
                <input type="password" id="login-password-input" class="login-input login-password-pos"
                    placeholder="Password">

                <button class="btn-login-pixel" id="btn-login">log in</button>

                <div class="login-footer-pixel">
                    Don't have a account? <a href="#" id="link-signup">Sign up</a>
                </div>
            </div>
        </div>

        <div id="choose-meow-overlay" style="display: none;">
            <div class="pixel-popup-choose">
                <img src="asset/bangchonmeo.png" alt="Bảng chọn mèo" class="choose-bg">

                <button class="arrow-btn-meow arrow-left" id="prev-meow">&lt;</button>
                <button class="arrow-btn-meow arrow-right" id="next-meow">&gt;</button>

                <div class="cat-showcase">
                    <div class="cat-box side-box">
                        <img src="asset/meoxamdung.gif" id="img-side" alt="Mèo xám">
                    </div>
                    <div class="cat-box main-box">
                        <img src="asset/meodung.gif" id="img-main" alt="Mèo vàng">
                    </div>
                </div>

                <button class="btn-choose" id="btn-choose-cat">Choose</button>
            </div>
        </div>

        <!-- Bảng Tạo Phòng (Room meow) -->
        <div id="room-overlay" class="overlay" style="display: none;">
            <div class="pixel-popup-room">
                <img src="asset/phong_hoc/Tao-phong-hoc.png" alt="Bảng tạo phòng" class="room-bg">

                <!-- Nút đóng (X) -->
                <button class="close-room-btn" id="close-room" aria-label="Đóng"></button>

                <!-- Các input và button đè lên ảnh nền -->
                <input type="text" id="room-user-name" class="room-input name-pos" placeholder="">
                <input type="text" id="room-id-input" class="room-input id-pos" placeholder="">

                <button class="btn-join-room" id="btn-join-room">Join</button>
                <img src="asset/phong_hoc/New-room-button.png" alt="New room" class="btn-new-room" id="btn-new-room">
            </div>
        </div>

        <!-- Giao diện Phòng học (Classroom) -->
        <div id="classroom-overlay" class="overlay" style="display: none;">
            <div class="classroom-popup">
                <img src="asset/phong_hoc/New room/Classroom-interface.png" alt="Phòng học" class="classroom-bg">

                <!-- Timer và Nút điều khiển -->
                <div class="classroom-timer-container">
                    <span id="classroom-timer">00:00</span>
                    <img src="asset/phong_hoc/New room/Start-btn.png" alt="Start" id="classroom-start-btn"
                        class="classroom-btn">
                    <div id="classroom-controls" class="nut-an">
                        <img src="asset/phong_hoc/New room/Pause-btn.png" alt="Pause" id="classroom-pause-btn"
                            class="classroom-control-btn">
                        <img src="asset/phong_hoc/New room/Stop-btn.png" alt="Stop" id="classroom-stop-btn"
                            class="classroom-control-btn">
                    </div>
                </div>

                <!-- Grid người dùng -->
                <div class="classroom-users-grid">
                    <div class="user-box"><img src="asset/phong_hoc/New room/User-1.png" alt="Linh"></div>
                    <div class="user-box"><img src="asset/phong_hoc/New room/User-2.png" alt="Quang"></div>
                    <div class="user-box"><img src="asset/phong_hoc/New room/User-3.png" alt="Phat"></div>

                </div>

                <!-- Main View -->
                <div class="classroom-main-view" id="main-view-container">
                    <img src="asset/phong_hoc/New room/Classroom-avatar.png" alt="Main View" class="main-view-bg">
                    <img src="asset/phong_hoc/New room/Avatar-extension.png" alt="Expand" class="avatar-extension"
                        id="btn-expand-view">
                    <img src="asset/phong_hoc/New room/Meo-xam.gif" class="classroom-cat cat-xam" alt="Mèo xám">
                    <img src="asset/phong_hoc/New room/Meo-vang.gif" class="classroom-cat cat-vang" alt="Mèo vàng">

                    <!-- Đồng hồ nhỏ trong phòng thú cưng -->
                    <div class="pet-room-clock-container">
                        <img src="asset/phong_hoc/New room/Đồng hồ đếm ngược.png" alt="Clock" class="pet-room-clock">
                        <span id="pet-room-timer-txt">25:00</span>
                    </div>
                </div>

                <!-- Chat Area -->
                <div class="classroom-chat-area">
                    <input type="text" placeholder="type a mess" id="classroom-chat-input">
                </div>

                <!-- Bottom Controls -->
                <div class="classroom-bottom-controls">
                    <div class="room-id-display">ID : 6868686</div>
                    <div class="control-icons">
                        <img src="asset/phong_hoc/New room/microphone.png" alt="Mic">
                        <img src="asset/phong_hoc/New room/Camera-on.png" alt="Cam">
                        <img src="asset/phong_hoc/New room/Rise-up.png" alt="Hand">
                        <img src="asset/phong_hoc/New room/Hang-up.png" alt="Hang up" id="hang-up-btn"
                            class="hang-up-btn">
                        <img src="asset/phong_hoc/New room/Emotion-bar.png" alt="Emotion">
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script type="module" src="js/app.js"></script>
</body>

</html>
