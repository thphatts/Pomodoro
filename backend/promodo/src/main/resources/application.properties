# Đổi cổng chạy server thành 8080
server.port=8080

# ===============================
# CẤU HÌNH KẾT NỐI MYSQL DATABASE
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/pomodoro_db?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=thphat08122007
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# CẤU HÌNH JPA / HIBERNATE
# ===============================
# Tự động tạo bảng/cập nhật cột dựa trên code Java (Rất tiện cho Hackathon)
spring.jpa.hibernate.ddl-auto=update
# Hiển thị câu lệnh SQL trên Terminal để dễ debug
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

#================================
# CẤU HÌNH SPRINGDOC SWAGGER
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.disable-swagger-default-url=true
spring.mvc.pathmatch.matching-strategy=ant_path_matcher