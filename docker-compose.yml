services:
  db:
    image: mysql:8.4
    container_name: pomodoro_db
    platform: linux/amd64 
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pomodoro_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: pomodoro_backend
    depends_on:
      db:
        condition: service_healthy 
    environment:
      SPRING_DATASOURCE_URL: ${DB_URL:-jdbc:mysql://db:3306/pomodoro_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-root}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-root}
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    container_name: pomodoro_frontend
    depends_on:
      - backend
    ports:
      - "5500:80"

volumes:
  db_data: