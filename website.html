<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mèo Pomodoro</title>

    <link rel="stylesheet" href="test.css">
</head>

<body>
    <div class="khung-game">

        <img src="asset/nutstart.PNG" alt="START" class="nut-start" id="nut-bat-dau">
    <input type="number" id="input" placeholder="Nhập số phút..." style="position: absolute; top: 20px; left: 20px; z-index: 10; padding: 5px; width: 120px; font-weight: bold; text-align: center; border-radius: 10px;">
        <img src="asset/nutstop.PNG" alt="STOP" class="nut-stop nut-an" id="nut-stop">
        <img src="asset/nutpause.PNG" alt="PAUSE" class="nut-pause nut-an" id="nut-pause">
        <img src="asset/anhnenthat.PNG" alt="Nền phòng" class="anh-nen">

        <img src="asset/nutshop.PNG" alt="Cửa hàng" class="nut-cua-hang">
        <img src="asset/nutvitien.PNG" alt="Ví tiền" class="vi-tien">
        <img src="asset/thanhthucan.PNG" alt="Thanh Thức ăn " class="thanh-thuc-an">
        <img src="asset/thanhcamxuc.PNG" alt="Thanh cảm xúc" class="thanh-cam-xuc">

        <div class="cum-meo-game">
            <img src="asset/meongu.GIF" alt="Chú mèo đang ngủ" class="chu-meo" id="meo-chinh">

            <div id="cum-dem-gio" class="bang-an">
                <img src="asset/bangdemgio.PNG" alt="Bảng" class="anh-nen-bang">
                <span id="so-giay">00:00</span>
            </div>
        </div>
    </div>


    <script src="script.js"></script>

</body>

</html>
